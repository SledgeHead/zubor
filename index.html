<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Zubor.Us!</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">

    <!-- Google Font (Quicksand) -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

    <style>
        /* Page styling */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #edfcfc;
            text-align: center;
            color: #4088b2;
            font-family: 'Quicksand', Arial, sans-serif;
        }

        img {
            display: block;
            margin: 0 auto 20px;
            max-width: 100%;
            max-height: 50%;
            height: auto;
        }

        #countdown, #child-age {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        a {
            color: #ffbcbc;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <img src="zuborUS.png" alt="Welcome to Zubor.Us!">

    <!-- Months Since Birth -->
    <p id="child-age">Calculating...</p>

    <!-- Countdown to Next Birthday -->
    <p id="countdown">Calculating...</p>

    <p>
        You are being redirected. If you have not been redirected after 5 seconds,
        <a href="https://www.babylist.com/dalton-zubor">click here</a>.
    </p>

    <script>
        function updateMonthsSinceBirth() {
            const birthDate = new Date("June 16, 2025");
            const today = new Date();

            let months =
                (today.getFullYear() - birthDate.getFullYear()) * 12 +
                (today.getMonth() - birthDate.getMonth());

            // If we haven't reached the birth day yet this month,
            // subtract one month.
            if (today.getDate() < birthDate.getDate()) {
                months--;
            }

            document.getElementById("child-age").innerText =
                `Dalton is ${months} month${months !== 1 ? 's' : ''} old`;
        }

        function updateNextBirthdayCountdown() {
            const today = new Date();
            const currentYear = today.getFullYear();
            let nextBirthday = new Date(`June 16, ${currentYear}`);

            if (today > nextBirthday) {
                nextBirthday = new Date(`June 16, ${currentYear + 1}`);
            }

            const timeDiff = nextBirthday - today;
            const daysLeft = Math.ceil(timeDiff / (1000 * 60 * 60 * 24));

            document.getElementById("countdown").innerText =
                `Days 'Til Dalton's Birthday: ${daysLeft} 🎉`;
        }

        updateMonthsSinceBirth();
        updateNextBirthdayCountdown();

        setTimeout(function() {
            window.location.href = "https://www.babylist.com/dalton-zubor";
        }, 5000);
    </script>
</body>
</html>
