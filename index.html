<img src="zuborUS.png" alt="Welcome to Zubor.Us!">

<p id="child-age">Calculating...</p>

<div class="links">

       href="https://cloud.clz.com/babyz/books?collectionStatus=in-collection"
       target="_blank">

    <a class="button"
       href="growth.html">
        📈 Growth Tracker
    </a>

    <a class="button"
       href="https://www.babylist.com/dalton-zubor"
       target="_blank">
        🧸 Dalton's Wishlist
    </a>

</div>

<div class="footer">
    Welcome to the Zubor family hub.
</div>

<script>
    function updateChildAge() {
        const birthDate = new Date("June 16, 2025");
        const today = new Date();

        let totalMonths =
            (today.getFullYear() - birthDate.getFullYear()) * 12 +
            (today.getMonth() - birthDate.getMonth());

        if (today.getDate() < birthDate.getDate()) {
            totalMonths--;
        }

        const years = Math.floor(totalMonths / 12);
        const months = totalMonths % 12;

        let ageText;

        if (years === 0) {
            ageText = `${months} month${months !== 1 ? "s" : ""} old`;
        } else if (months === 0) {
            ageText = `${years} year${years !== 1 ? "s" : ""} old`;
        } else {
            ageText = `${years} year${years !== 1 ? "s" : ""}, ${months} month${months !== 1 ? "s" : ""} old`;
        }

        document.getElementById("child-age").innerText =
            `Dalton is ${ageText}`;
    }

    function updateNextBirthdayCountdown() {
        const today = new Date();
        const currentYear = today.getFullYear();

        let nextBirthday = new Date(currentYear, 5, 16); // June = month 5

        if (today > nextBirthday) {
            nextBirthday = new Date(currentYear + 1, 5, 16);
        }

        const msPerDay = 1000 * 60 * 60 * 24;
        const daysLeft = Math.ceil((nextBirthday - today) / msPerDay);

        if (daysLeft === 0) {
            document.getElementById("countdown").innerText =
                "🎂 Happy Birthday, Dalton!";
        } else {
            document.getElementById("countdown").innerText =
                `🎉 ${daysLeft} day${daysLeft !== 1 ? "s" : ""} until Dalton's birthday`;
        }
    }

    updateChildAge();
    updateNextBirthdayCountdown();
</script>
